version: '3.8'

services:
  # 1. SQL Server Container
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: student-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourPassword123! -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. ASP.NET Core Web API Container
  student-api:
    build:
      context: .
      dockerfile: Student.Api/Dockerfile
    container_name: student-management-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=StudentManagementDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=True;
      - UseSqlite=false
      - Jwt__Key=ZestIndiaTechnicalAssignmentSecretKeyForJWTAuth2026!
      - Jwt__Issuer=StudentApi
      - Jwt__Audience=StudentApiClients
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
